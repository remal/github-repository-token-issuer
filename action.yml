name: 'GitHub Repository Token Issuer'
description: 'Issues short-lived GitHub installation tokens with specific repository permissions'

inputs:
  scopes:
    description: 'Repository permission scopes (one per line, format: scope_id: permission)'
    required: true
  service_tag:
    description: 'Cloud Run service tag for canary deployments (e.g., "canary"). When set, uses the tag-specific URL.'
    required: false
    default: ''

outputs:
  token:
    description: 'The GitHub installation access token'
    value: ${{ steps.get-token.outputs.token }}

runs:
  using: 'composite'
  steps:
    - name: Check dependencies
      shell: bash
      run: |
        # Check dependencies
        missing=()
        command -v curl &>/dev/null || missing+=("curl")
        command -v jq &>/dev/null || missing+=("jq")
        if [[ ${#missing[@]} -gt 0 ]]; then
          echo "Error: Missing required dependencies: ${missing[*]}"
          exit 1
        fi

    - name: Get GitHub OIDC Token
      id: oidc
      shell: bash
      run: |
        # Get GitHub OIDC Token
        OIDC_RESPONSE=$(mktemp)
        HTTP_CODE=$(bash "$GITHUB_ACTION_PATH/curl-with-retry.sh" "$OIDC_RESPONSE" \
          --max-time 10 \
          --header "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=gh-repo-token-issuer")
        RESPONSE=$(cat "$OIDC_RESPONSE")
        if [[ ! "$HTTP_CODE" =~ ^2 ]]; then
          echo "Error: Failed to get GitHub OIDC token (HTTP $HTTP_CODE)"
          echo "$RESPONSE"
          exit 1
        fi

        if ! OIDC_TOKEN=$(echo "$RESPONSE" | jq --raw-output '.value // empty') || [[ -z "$OIDC_TOKEN" ]]; then
          echo "Error: Failed to get GitHub OIDC token"
          echo "$RESPONSE"
          exit 1
        fi
        echo "::add-mask::$OIDC_TOKEN"
        echo "token=$OIDC_TOKEN" >> $GITHUB_OUTPUT

    - name: Convert scopes to query params
      id: scopes
      shell: bash
      env:
        INPUT_SCOPES: ${{inputs.scopes}}
      run: |
        # Convert scopes to query params
        QUERY=""
        while IFS= read -r line; do
          [[ -z "$line" || "$line" =~ ^[[:space:]]*$ ]] && continue
          SCOPE_ID=$(echo "${line%%:*}" | xargs)
          PERMISSION=$(echo "${line##*:}" | xargs)
          [[ -n "$QUERY" ]] && QUERY="${QUERY}&"
          QUERY="${QUERY}${SCOPE_ID}=${PERMISSION}"
        done <<< "$INPUT_SCOPES"
        echo "query=$QUERY" >> $GITHUB_OUTPUT

    - name: Request Installation Token
      id: get-token
      shell: bash
      env:
        SERVICE_TAG: ${{inputs.service_tag}}
        OIDC_TOKEN: ${{steps.oidc.outputs.token}}
        SCOPES_QUERY: ${{steps.scopes.outputs.query}}
      run: |
        # Request Installation Token
        if [[ -n "$SERVICE_TAG" ]]; then
          SERVICE_URL="https://${SERVICE_TAG}---gh-repo-token-issuer-db7udto7gq-uk.a.run.app"
        else
          SERVICE_URL="https://gh-repo-token-issuer-db7udto7gq-uk.a.run.app"
        fi
        TOKEN_RESPONSE=$(mktemp)
        HTTP_CODE=$(bash "$GITHUB_ACTION_PATH/curl-with-retry.sh" "$TOKEN_RESPONSE" \
          --max-time 300 --request POST \
          --header "Authorization: Bearer $OIDC_TOKEN" \
          --header "Accept: application/json" \
          --header "Content-Length: 0" \
          "${SERVICE_URL}/token?${SCOPES_QUERY}")
        RESPONSE=$(cat "$TOKEN_RESPONSE")
        if [[ ! "$HTTP_CODE" =~ ^2 ]]; then
          echo "Error: Token request failed (HTTP $HTTP_CODE)"
          echo "$RESPONSE"
          exit 1
        fi
        if ! TOKEN=$(echo "$RESPONSE" | jq --raw-output '.token // empty'); then
          echo "Error: Invalid response from token service"
          echo "$RESPONSE"
          exit 1
        fi
        if [[ -z "$TOKEN" ]]; then
          ERROR=$(echo "$RESPONSE" | jq --raw-output '.error // empty')
          echo "Error: ${ERROR:-Unknown error}"
          echo "$RESPONSE"
          exit 1
        fi
        echo "::add-mask::$TOKEN"
        echo "token=$TOKEN" >> $GITHUB_OUTPUT
